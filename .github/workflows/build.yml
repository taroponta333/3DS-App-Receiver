name: Build EBOOT.PBP

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container: pspdev/pspdev:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Upload EBOOT
        uses: actions/upload-artifact@v4
        with:
          name: PSP-Receiver-EBOOT
          path: EBOOT.PBP
